name: Build and Release Deployable Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'Automated build release'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      enable_auth:
        description: 'Enable authentication (requires WISP_URL and TOKEN)'
        required: false
        type: boolean
        default: false
      wisp_url:
        description: 'WISP backend URL (e.g., wss://your-worker.workers.dev/wisp/)'
        required: false
        type: string
        default: ''
      auth_token:
        description: 'Authentication token for WISP backend'
        required: false
        type: string
        default: ''

# 💡 使用示例：
# 
# 场景 1: 生产环境部署（启用认证）
# - enable_auth: true
# - wisp_url: wss://web-sideload-app.your-account.workers.dev/wisp/
# - auth_token: your_secure_password_here
#
# 场景 2: 开发/测试环境（不启用认证）
# - enable_auth: false
# - wisp_url: (留空)
# - auth_token: (留空)
#
# 场景 3: 使用 GitHub Secrets 保护 Token（推荐）
# 在仓库 Settings > Secrets and variables > Actions 中添加：
# - WISP_BACKEND_URL: wss://xxx.workers.dev/wisp/
# - WISP_AUTH_TOKEN: your_secret_token
# 然后在工作流中使用 ${{ secrets.WISP_BACKEND_URL }} 和 ${{ secrets.WISP_AUTH_TOKEN }}

permissions:
  contents: write # 需要写入权限以创建 Release 和上传资产

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（包含子模块）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. 设置 Bun 环境
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 3. 缓存依赖以加速构建
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            frontend/node_modules
            backend/node_modules
            dependencies/webmuxd/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # 4. 安装依赖
      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          bun install --frozen-lockfile --ignore-scripts
          echo "Dependencies installed successfully"

      # 5. 构建 WASM 分发版本
      - name: Build WASM dist
        run: |
          echo "Building WASM distribution..."
          bun run build:wasm:dist
          echo "WASM build completed"

      # 6. 配置前端环境变量（如果启用认证）
      - name: Configure frontend environment
        if: ${{ github.event.inputs.enable_auth == 'true' }}
        run: |
          echo "Configuring frontend environment with authentication..."
          
          # 验证必需参数
          if [ -z "${{ github.event.inputs.wisp_url }}" ]; then
            echo "::error::WISP_URL is required when authentication is enabled"
            exit 1
          fi
          
          if [ -z "${{ github.event.inputs.auth_token }}" ]; then
            echo "::error::AUTH_TOKEN is required when authentication is enabled"
            exit 1
          fi
          
          # 创建 .env.production 文件
          cat > frontend/.env.production << EOF
          # Auto-generated by GitHub Actions
          # Build Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VITE_WISP_URL=${{ github.event.inputs.wisp_url }}?token=${{ github.event.inputs.auth_token }}
          EOF
          
          echo "Frontend environment configured:"
          cat frontend/.env.production
          
          # 同时创建示例配置文件供参考
          cat > frontend/.env.example << 'EOF'
          # WISP Backend URL with Authentication
          # Format: wss://your-worker.workers.dev/wisp/?token=YOUR_TOKEN
          VITE_WISP_URL=wss://your-worker.workers.dev/wisp/?token=your_secret_token
          EOF
          
          echo "Environment configuration completed"

      # 7. 构建前端静态资源
      - name: Build frontend
        run: |
          echo "Building frontend..."
          cd frontend
          
          # 如果未启用认证，确保没有 .env.production 干扰
          if [ "${{ github.event.inputs.enable_auth }}" != "true" ]; then
            echo "No authentication configured, using dynamic URL"
            rm -f .env.production
          fi
          
          bun run build
          echo "Frontend build completed"
          ls -la dist/

      # 8. 验证后端配置
      - name: Verify backend configuration
        run: |
          echo "Verifying backend configuration..."
          cd backend
          bun run check
          echo "Backend configuration verified"

      # 9. 准备部署包目录结构
      - name: Prepare deployment package
        run: |
          echo "Preparing deployment package..."
          
          # 创建部署包根目录
          mkdir -p deploy-package
          
          # 复制前端构建产物
          cp -r frontend/dist deploy-package/frontend-dist
          
          # 复制后端源代码和配置
          mkdir -p deploy-package/backend
          cp -r backend/src deploy-package/backend/
          cp backend/package.json deploy-package/backend/
          cp backend/tsconfig.json deploy-package/backend/
          cp backend/wrangler.jsonc deploy-package/backend/ 2>/dev/null || cp backend/wrangler.toml deploy-package/backend/ 2>/dev/null || echo "No wrangler config found"
          cp backend/README.md deploy-package/backend/ 2>/dev/null || true
          cp backend/README_EN.md deploy-package/backend/ 2>/dev/null || true
          
          # 复制 Docker 部署相关文件
          cp Dockerfile deploy-package/
          cp nginx.conf deploy-package/
          cp .dockerignore deploy-package/ 2>/dev/null || true
          
          # 生成认证状态和说明
          if [ "${{ github.event.inputs.enable_auth }}" == "true" ]; then
            AUTH_STATUS="✅ 已配置认证保护"
            AUTH_NOTE="
### 🔐 认证配置(已启用)

此构建版本已配置 WISP 后端认证。前端将使用以下 URL 连接后端:
\`\`\`
${{ github.event.inputs.wisp_url }}?token=***
\`\`\`

**重要提示:**
- 确保您的 Cloudflare Workers 已配置相同的 token
- 使用 \`wrangler secret put ACCESS_PASSWORD\` 或 \`ACCESS_TOKEN_HASH\` 设置后端认证
- Token 不匹配将导致 401 Unauthorized 错误
"
          else
            AUTH_STATUS="⚠️ 未配置认证保护"
            AUTH_NOTE="
### ⚠️ 安全警告:未启用认证

此构建版本**未配置认证保护**,任何人都可以访问您的 WISP 后端!

**生产环境强烈建议启用认证:**
1. 在 Cloudflare Workers 中设置 Secret:
   \`\`\`bash
   wrangler secret put ACCESS_PASSWORD
   # 或
   echo -n \"your_password\" | sha256sum
   wrangler secret put ACCESS_TOKEN_HASH
   \`\`\`
2. 重新构建前端并配置 VITE_WISP_URL:
   \`\`\`env
   VITE_WISP_URL=wss://your-worker.workers.dev/wisp/?token=your_password
   \`\`\`
3. 运行 \`bun run build\` 重新构建

**风险提示:** 不配置认证可能导致:
- ❌ 未经授权的访问和使用
- ❌ Cloudflare Workers 费用滥用
- ❌ 潜在的安全风险
"
          fi
          
          # 使用模板生成 DEPLOYMENT.md
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # 先复制模板
          cp .github/templates/DEPLOYMENT.md.template deploy-package/DEPLOYMENT.md
          
          # 替换简单占位符
          sed -i "s|{{VERSION}}|${{ github.event.inputs.version }}|g" deploy-package/DEPLOYMENT.md
          sed -i "s|{{AUTH_STATUS}}|${AUTH_STATUS}|g" deploy-package/DEPLOYMENT.md
          sed -i "s|{{BUILD_TIME}}|${BUILD_TIME}|g" deploy-package/DEPLOYMENT.md
          sed -i "s|{{COMMIT_SHA}}|${{ github.sha }}|g" deploy-package/DEPLOYMENT.md
          
          # 替换多行 AUTH_NOTE (使用 awk)
          awk -v note="${AUTH_NOTE}" '{
            if ($0 ~ /{{AUTH_NOTE}}/) {
              print note
            } else {
              print $0
            }
          }' deploy-package/DEPLOYMENT.md > deploy-package/DEPLOYMENT.md.tmp
          mv deploy-package/DEPLOYMENT.md.tmp deploy-package/DEPLOYMENT.md
          
          echo "Deployment package prepared successfully"
          ls -la deploy-package/

      # 10. 压缩部署包
      - name: Archive deployment package
        run: |
          echo "Creating archive..."
          VERSION="${{ github.event.inputs.version }}"
          ARCHIVE_NAME="web-sideload-app-${VERSION#v}"
          
          # 创建 tar.gz 压缩包
          tar -czf "${ARCHIVE_NAME}.tar.gz" deploy-package/
          
          # 同时创建 zip 格式（Windows 用户友好）
          apt-get update && apt-get install -y zip
          zip -r "${ARCHIVE_NAME}.zip" deploy-package/
          
          echo "Archives created:"
          ls -lh *.tar.gz *.zip

      # 11. 生成校验和
      - name: Generate checksums
        run: |
          echo "Generating checksums..."
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          md5sum *.tar.gz *.zip > MD5SUMS.txt
          echo "Checksums generated:"
          cat SHA256SUMS.txt

      # 12. 创建 GitHub Release 并上传资产
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: |
            ## ${{ github.event.inputs.release_notes }}
            
            ### 📦 包含内容
            - ✅ 前端静态资源（可用于 Cloudflare Pages、Nginx 等）
            - ✅ 后端 Cloudflare Workers 代码
            - ✅ Docker 部署配置
            - ✅ 详细的部署说明文档
            
            ### 🔐 认证配置
            ${{ github.event.inputs.enable_auth == 'true' && '- ✅ **已启用认证保护**：前端已配置 WISP URL 和 Token' || '- ⚠️ **未启用认证**：生产环境强烈建议配置 ACCESS_PASSWORD 或 ACCESS_TOKEN_HASH' }}
            
            ${{ github.event.inputs.enable_auth == 'true' && format('- **WISP URL**: {0}/?token=***', github.event.inputs.wisp_url) || '' }}
            
            ### 🚀 快速开始
            
            #### 方式 1: Cloudflare 部署（推荐）
            ```bash
            # 解压后
            cd backend
            bun install
            npx wrangler deploy
            
            # 前端部署到 Pages
            cd ../frontend-dist
            npx wrangler pages deploy .
            ```
            
            #### 方式 2: Docker 部署
            ```bash
            docker build -t web-sideload-app .
            docker run -d -p 3000:3000 web-sideload-app
            ```
            
            ### 📋 文件说明
            - `frontend-dist/`: 前端静态资源，可直接部署到任何静态托管服务
            - `backend/`: Cloudflare Workers 后端代码
            - `Dockerfile`: Docker 构建配置
            - `nginx.conf`: Nginx 配置文件
            - `DEPLOYMENT.md`: 详细部署指南（包含认证配置说明）
            
            ### ⚠️ 重要提示
            ${{ github.event.inputs.enable_auth == 'true' && '- ✅ 此版本已配置认证，确保后端设置相同的 token' || '- ⚠️ **生产环境必须配置认证**以防止未授权访问和费用滥用' }}
            - 需要使用支持 WebUSB 的浏览器（Chrome/Edge）
            - 必须在 HTTPS 环境下运行（localhost 除外）
            - 查看 `DEPLOYMENT.md` 了解完整的认证配置步骤
            
            ### 🔗 相关链接
            - [项目主页](https://github.com/${{ github.repository }})
            - [问题反馈](https://github.com/${{ github.repository }}/issues)
            - [Cloudflare Workers 认证文档](https://developers.cloudflare.com/workers/configuration/secrets/)
            
            ---
            **Build Info:**
            - Commit: ${{ github.sha }}
            - Build Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            - Authentication: ${{ github.event.inputs.enable_auth == 'true' && 'Enabled' || 'Disabled' }}
          files: |
            *.tar.gz
            *.zip
            SHA256SUMS.txt
            MD5SUMS.txt
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 13. 输出部署信息
      - name: Deployment summary
        run: |
          echo "## ✅ 构建完成！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本:** ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**提交:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**认证状态:** ${{ github.event.inputs.enable_auth == 'true' && '✅ 已启用' || '⚠️ 未启用' }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.inputs.enable_auth }}" == "true" ]; then
            echo "**WISP URL:** \`${{ github.event.inputs.wisp_url }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔐 认证配置" >> $GITHUB_STEP_SUMMARY
            echo "- 前端已嵌入 WISP URL 和 Token" >> $GITHUB_STEP_SUMMARY
            echo "- 确保 Cloudflare Workers 配置了相同的 token" >> $GITHUB_STEP_SUMMARY
            echo "- 使用 \`wrangler secret put ACCESS_PASSWORD\` 设置后端认证" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚠️ 安全警告" >> $GITHUB_STEP_SUMMARY
            echo "- **此版本未配置认证保护**" >> $GITHUB_STEP_SUMMARY
            echo "- 生产环境强烈建议配置 ACCESS_PASSWORD 或 ACCESS_TOKEN_HASH" >> $GITHUB_STEP_SUMMARY
            echo "- 查看 DEPLOYMENT.md 了解配置步骤" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 已生成的部署包：" >> $GITHUB_STEP_SUMMARY
          echo "- \`web-sideload-app-${{ github.event.inputs.version }}.tar.gz\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`web-sideload-app-${{ github.event.inputs.version }}.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 下一步操作：" >> $GITHUB_STEP_SUMMARY
          echo "1. 前往 [Releases 页面](https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.version }}) 下载部署包" >> $GITHUB_STEP_SUMMARY
          echo "2. 查看 \`DEPLOYMENT.md\` 了解详细部署步骤" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.enable_auth }}" != "true" ]; then
            echo "3. **配置认证**以防止未授权访问" >> $GITHUB_STEP_SUMMARY
            echo "4. 重新构建并部署前端" >> $GITHUB_STEP_SUMMARY
          else
            echo "3. 部署到 Cloudflare Pages/Workers" >> $GITHUB_STEP_SUMMARY
            echo "4. 验证认证是否正常工作" >> $GITHUB_STEP_SUMMARY
          fi
